<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FeedbackHub Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        -45deg,
        #4f46e5,
        #7c3aed,
        #ec4899,
        #06b6d4
    );
    background-size:400% 400%;
    animation:gradient 12s ease infinite;
    overflow:hidden;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Floating Shapes */

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
}

.c1{
    width:250px;
    height:250px;
    top:-50px;
    left:-50px;
}

.c2{
    width:180px;
    height:180px;
    bottom:50px;
    right:50px;
}

.c3{
    width:100px;
    height:100px;
    top:200px;
    right:250px;
}

/* Login Card */

.login-container{
    width:420px;
    padding:40px;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;

    box-shadow:0 15px 35px rgba(0,0,0,0.2);

    color:white;
    z-index:2;
}

.logo{
    text-align:center;
    font-size:2rem;
    margin-bottom:10px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    opacity:.8;
    margin-bottom:30px;
}

/* Input Fields */

.input-box{
    position:relative;
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,.15);
    color:white;
    font-size:15px;
}

.input-box input::placeholder{
    color:#ddd;
}

/* Password Button */

.show-btn{
    position:absolute;
    right:15px;
    top:15px;
    cursor:pointer;
}

/* Options */

.options{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
    font-size:14px;
}

.options a{
    color:#ffd700;
    text-decoration:none;
}

/* Login Button */

.login-btn{
    width:100%;
    padding:15px;

    border:none;
    border-radius:12px;

    background:white;
    color:#4f46e5;

    font-size:16px;
    font-weight:600;
    cursor:pointer;

    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-3px);
}

/* Divider */

.divider{
    text-align:center;
    margin:20px 0;
    position:relative;
}

.divider::before,
.divider::after{
    content:"";
    position:absolute;
    width:40%;
    height:1px;
    background:white;
    top:50%;
}

.divider::before{
    left:0;
}

.divider::after{
    right:0;
}

/* Social Buttons */

.social{
    display:flex;
    gap:15px;
}

.social button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.google{
    background:#fff;
}

.github{
    background:#24292e;
    color:white;
}

/* Signup */

.signup{
    text-align:center;
    margin-top:25px;
}

.signup a{
    color:#ffd700;
    text-decoration:none;
    font-weight:600;
}

/* Responsive */

@media(max-width:500px){

.login-container{
    width:90%;
    padding:30px;
}

}

</style>
</head>
<body>

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<div class="login-container">

    <div class="logo">💬</div>

    <h1>Welcome Back</h1>

    <p class="subtitle">
        Login to continue your feedback journey
    </p>

    <div class="input-box">
        <input type="email" placeholder="Email Address">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
        <span class="show-btn" onclick="togglePassword()">👁</span>
    </div>

    <div class="options">
        <label>
            <input type="checkbox">
            Remember Me
        </label>

        <a href="#">Forgot Password?</a>
    </div>

    <button class="login-btn" onclick="login()">
        Login →
    </button>

    <div class="divider">
        OR
    </div>

    <div class="social">
        <button class="google">Google</button>
        <button class="github">GitHub</button>
    </div>

    <div class="signup">
        Don't have an account?
        <a href="signup.html">Create Account</a>
    </div>

</div>

<script>

function togglePassword(){

    let pass = document.getElementById("password");

    if(pass.type==="password"){
        pass.type="text";
    }
    else{
        pass.type="password";
    }
}

function login(){
    alert("🎉 Login Successful!");
    window.location.href="pg8.html";
}

</script>

</body>
</html>
